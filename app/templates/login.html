{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <h2>{{ _('Sign In') }}</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    {% for message in messages %}
                        <p class="flash-message">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('main.login') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">{{ _('Username') }}</label>
                <input type="text" id="username" name="username" required class="input-field" placeholder="{{ _('Enter your username') }}">
            </div>
            
            <div class="form-group">
                <label for="password">{{ _('Password') }}</label>
                <input type="password" id="password" name="password" required class="input-field" placeholder="{{ _('Enter your password') }}">
            </div>
            
            <button type="submit" class="btn-primary auth-btn">{{ _('Login') }}</button>
        </form>
        
        <p class="auth-footer">
            {{ _("Don't have an account?") }} <a href="{{ url_for('main.register') }}">{{ _('Register here') }}</a>
        </p>
    </div>
</div>
{% endblock %}
