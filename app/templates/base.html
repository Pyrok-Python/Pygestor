<!DOCTYPE html>
<html lang="{{ session.get('lang', 'en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pygestor - Premium Task Manager</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
</head>
<body>
    <div class="background-animation"></div>
    
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <a href="{{ url_for('main.index') }}" class="logo-link">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Pygestor Logo" class="nav-logo">
                    <h1 class="logo">Pygestor<span class="dot">.</span></h1>
                </a>
            </div>
            
            <div class="nav-right">
                <!-- Language Selector -->
                <div class="lang-selector">
                    <a href="{{ url_for('main.set_lang', lang='en') }}" class="lang-btn {% if session.get('lang', 'en') == 'en' %}active{% endif %}">EN</a>
                    <span class="divider">|</span>
                    <a href="{{ url_for('main.set_lang', lang='es') }}" class="lang-btn {% if session.get('lang') == 'es' %}active{% endif %}">ES</a>
                </div>
                
                <!-- Auth buttons -->
                {% if current_user.is_authenticated %}
                    <a href="{{ url_for('main.logout') }}" class="btn-logout">{{ _('Logout') }}</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Pygestor &copy; 2026 - Portfolio Project</p>
    </footer>
</body>
</html>
